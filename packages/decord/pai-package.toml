schema_version = 1
name = "decord"
project_name = "decord"
status = "historical"
upstream = "https://github.com/dmlc/decord"
gpu_risk = "medium"

[license]
expression = "Apache-2.0"
files = ["LICENSE"]
confidence = "high"
notes = "Python subdirectory builds must still preserve the root license; Video Codec SDK headers require release review."

[license_review]
required = true
url = "https://docs.nvidia.com/video-technologies/video-codec-sdk/"
notes = "The checked-in interface headers are used because fetch-at-build is not practical; verify SDK terms before publishing decord wheels."

[build]
backend = "pip-wheel-git"
script = "build.sh"
common_pip_flags = true
requires_torch = false
prebuild_scripts = ["build_lib.sh"]
system_packages = [
  "build-essential",
  "make",
  "cmake",
  "ffmpeg",
  "libavcodec-dev",
  "libavfilter-dev",
  "libavformat-dev",
  "libavutil-dev",
]

[build.source]
url = "https://github.com/dmlc/decord.git"
revision = "v{package_version}"
subdirectory = "python"

[build.env]
exports = [
  "DECORD_BUILD_JOBS",
  "DECORD_CUDA_ARCHITECTURES",
  "DECORD_VIDEO_CODEC_INTERFACE_DIR",
  "DECORD_VIDEO_CODEC_LIB_DIR",
]
