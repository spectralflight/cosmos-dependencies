schema_version = 1
name = "natten"
project_name = "natten"
status = "maintained"
upstream = "https://github.com/SHI-Labs/NATTEN"
gpu_risk = "high"

[license]
expression = "MIT"
files = ["LICENSE"]
confidence = "high"

[build]
backend = "pip-wheel-git"
script = "build.sh"
common_pip_flags = true

[build.source]
url = "https://github.com/SHI-Labs/NATTEN.git"
revision = "v{package_version}"

[build.revision_overrides]
"0.21.6.dev6" = "07c82f517b90342a0be5d5278acb9af8d1ebd3fe"

[build.env]
exports = ["NATTEN_N_WORKERS", "NATTEN_VERBOSE", "NATTEN_CUDA_ARCH"]
defaults = { NATTEN_N_WORKERS = "nproc/2", NATTEN_CUDA_ARCH = "${TORCH_CUDA_ARCH_LIST};10.3" }
