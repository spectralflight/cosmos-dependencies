schema_version = 1
name = "flash-attn-3-nv"
project_name = "flash-attn-3-nv"
status = "historical"
upstream = "https://github.com/alihassanijr/flash_attn_3_nv"
gpu_risk = "high"

[license]
expression = "NOASSERTION"
files = ["LICENSE", "AUTHORS"]
confidence = "low"
notes = "Fork provenance and retained upstream license files must be verified before publishing new wheels."

[license_review]
required = true
url = "https://github.com/alihassanijr/flash_attn_3_nv"
notes = "Review exact source revision and license files before any release."

[build]
backend = "pip-wheel-git"
script = "build.sh"
common_pip_flags = true

[build.source]
url = "https://github.com/alihassanijr/flash_attn_3_nv.git"
revision = "v{package_version}"

[build.env]
exports = ["MAX_JOBS", "FLASH_ATTENTION_DISABLE_SM80", "FLASH_ATTENTION_FORCE_BUILD"]
defaults = { MAX_JOBS = "nproc/4" }
