repos:
  - repo: local
    hooks:
      - id: gitleaks
        name: Detect hardcoded secrets
        entry: ./just/check/scripts/gitleaks-tracked.sh
        language: script
        pass_filenames: false
      - id: forbid-submodules
        name: Forbid git submodules
        entry: ./just/check/scripts/git-safety.sh submodules
        language: script
        pass_filenames: false
      - id: check-large-files
        name: Check large tracked files
        entry: ./just/check/scripts/git-safety.sh large-files --max-kb 5000
        language: script
