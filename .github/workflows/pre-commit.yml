name: Pre-commit
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@v2
        with:
          install: true
      - name: Check package index immutability
        if: github.event_name == 'pull_request'
        run: mise exec -- uv run --frozen python ci/check_docs_indices.py --base "origin/${{ github.base_ref }}"
      - name: Check package manifest immutability
        if: github.event_name == 'pull_request'
        run: mise exec -- uv run --frozen python ci/check_index_manifests.py --base "origin/${{ github.base_ref }}"
      - name: Check package index immutability on push
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        run: mise exec -- uv run --frozen python ci/check_docs_indices.py --base "${{ github.event.before }}"
      - name: Check package manifest immutability on push
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        run: mise exec -- uv run --frozen python ci/check_index_manifests.py --base "${{ github.event.before }}"
      - run: mise exec -- pre-commit run -c ci/.pre-commit-config-base.yaml --all-files
      - run: mise exec -- pre-commit run --all-files
